services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  realtime:
    build: ./realtime
    ports:
      - '0.0.0.0:42069:42069'
    environment:
      PORT: 42069
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
    restart: unless-stopped

  engine:
    build:
      context: .
      dockerfile: engine/Dockerfile
    ports:
      - '0.0.0.0:3000:3000'
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    ports:
      - '80:80'
    depends_on:
      - engine
      - realtime
    restart: unless-stopped

  postgres:
    container_name: transcendence_postgres
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-transcendence}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-transcendence}
      POSTGRES_DB: ${POSTGRES_DB:-transcendence}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-transcendence} -d ${POSTGRES_DB:-transcendence}"]
      interval: 10s
      timeout: 5s
      retries: 5

  database:
    build:
      context: ./database
      dockerfile: Dockerfile
    container_name: transcendence_database
    restart: unless-stopped
    ports:
      - "${PRISMA_PORT:-4000}:${PRISMA_PORT:-4000}"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PRISMA_PORT:-4000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-transcendence}:${POSTGRES_PASSWORD:-transcendence}@postgres:5432/${POSTGRES_DB:-transcendence}
      DB_HOST: postgres
      DB_PORT: ${POSTGRES_PORT:-5432}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PRISMA_PORT:-4000}/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:

